<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluid Mobile Web Wrapper (iframe srcdoc)</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #control-bar {
            flex: 0 0 50px;
            height: 50px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            z-index: 99999;
            box-sizing: border-box;
        }

        #url-input {
            flex: 1;
            height: 34px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        #go-btn {
            height: 34px;
            padding: 0 16px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 字體控制與網址同列，節省空間 */
        #font-control {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
            white-space: nowrap;
        }

        #font-control .font-label {
            font-size: 13px;
            color: #606266;
        }

        #font-control input[type="range"] {
            width: 96px;
            accent-color: #409eff;
        }

        #font-size-val {
            min-width: 40px;
            text-align: right;
            color: #409eff;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        #frame-wrap {
            flex: 1 1 auto;
            min-height: 0;
            position: relative;
            background: #ffffff;
        }

        #content-viewport {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #ffffff;
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 16px;
            color: #606266;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <div id="control-bar">
        <input type="text" id="url-input" placeholder="輸入網址..." />
        <div id="font-control">
            <span class="font-label">字體</span>
            <input type="range" id="font-size" min="12" max="32" step="1" value="23" />
            <span id="font-size-val">23px</span>
        </div>
        <button id="go-btn">前往</button>
    </div>

    <div id="frame-wrap">
        <iframe id="content-viewport" sandbox="allow-scripts allow-same-origin allow-popups allow-modals"></iframe>
        <div id="overlay">正在初始化系統並優化排版...</div>
    </div>

    <script>
        /**
         * 1. 封鎖瀏覽器縮放行為
         */
        class ZoomGuard {
            constructor() {
                this.bindPreventionEvents();
            }
            bindPreventionEvents() {
                document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
                document.addEventListener('touchmove', (e) => { if (e.scale && e.scale !== 1) e.preventDefault(); }, { passive: false });
            }
        }

        /**
         * 2. 網址參數管理
         */
        class UrlManager {
            constructor(defaultUrl) {
                this.defaultUrl = defaultUrl;
                this.params = new URLSearchParams(window.location.search);
            }
            getTargetUrl() {
                return this.params.get('url') || this.defaultUrl;
            }
            normalizeUrl(url) {
                let t = (url || '').trim();
                if (!t) return '';
                if (!/^https?:\/\//i.test(t)) t = 'https://' + t;
                return t;
            }
            generateRedirectUrl(targetUrl) {
                return window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(targetUrl);
            }
        }

        /**
         * 3. 控制列互動
         */
        class NavigationController {
            constructor(urlManager) {
                this.urlManager = urlManager;
                this.inputEl = document.getElementById('url-input');
                this.btnEl = document.getElementById('go-btn');
                this.btnEl.addEventListener('click', () => this.executeNavigation());
                this.inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') this.executeNavigation(); });
            }
            setCurrentUrl(url) { this.inputEl.value = url; }
            executeNavigation() {
                const v = this.urlManager.normalizeUrl(this.inputEl.value);
                if (v) window.location.href = this.urlManager.generateRedirectUrl(v);
            }
        }

        /**
         * 4. 使用者顯示設定（字體大小）— 套用至 iframe 內部文件
         */
        class DisplaySettings {
            constructor(iframe) {
                this.iframe = iframe;
                this.fontSize = 23;
                this.userStyleId = 'wb-user-font';
                this.input = document.getElementById('font-size');
                this.val = document.getElementById('font-size-val');
                this.input.addEventListener('input', () => {
                    this.fontSize = parseInt(this.input.value, 10);
                    this.val.textContent = this.fontSize + 'px';
                    this.applyFontSize();
                });
            }
            applyFontSize() {
                const doc = this.iframe.contentDocument;
                if (!doc || !doc.documentElement) return;
                doc.documentElement.setAttribute('id', 'wbroot');
                let s = doc.getElementById(this.userStyleId);
                if (!s) {
                    s = doc.createElement('style');
                    s.id = this.userStyleId;
                    (doc.head || doc.documentElement).appendChild(s);
                }
                // 強制每個元素字體大小（不動顏色），等同舊版行為
                s.textContent = `#wbroot, #wbroot * { font-size: ${this.fontSize}px !important; line-height: 1.8 !important; }`;
            }
        }

        /**
         * 5. 提取文字 + 圖片，重建成乾淨單欄 HTML（完全繞過原始網站 CSS）
         */
        function escapeHtml(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function findMainContent(doc) {
            let el = doc.querySelector('article') || doc.querySelector('main');
            if (el) return el;
            // 嘗試 content/article/post 相關 class/id
            const sel = '[id*="content"],[id*="article"],[id*="post"],[id*="entry"],[id*="main"],' +
                        '[class*="content"],[class*="article"],[class*="post"],[class*="entry"],[class*="main"]';
            const candidates = doc.querySelectorAll(sel);
            if (candidates.length > 0) return candidates[0];
            return doc.body;
        }

        function extractElements(root, baseUrl) {
            const items = [];
            const skipTags = new Set(['script','style','noscript','iframe','nav','footer','aside','header','form','button','input','select','textarea','svg']);
            function walk(node) {
                if (!node) return;
                if (node.nodeType === 3) {
                    const t = node.textContent.trim();
                    if (t) items.push({ type: 'p', text: t });
                    return;
                }
                if (node.nodeType !== 1) return;
                const tag = (node.tagName || '').toLowerCase();
                if (skipTags.has(tag)) return;
                if (tag === 'img') {
                    const src = node.getAttribute('src') || node.getAttribute('data-src') || '';
                    const alt = node.getAttribute('alt') || '';
                    if (src) {
                        try { items.push({ type: 'img', src: new URL(src, baseUrl).href, alt }); }
                        catch(_) { items.push({ type: 'img', src, alt }); }
                    }
                    return;
                }
                if (/^h[1-6]$/.test(tag)) { const t = node.textContent.trim(); if (t) items.push({ type: tag, text: t }); return; }
                if (tag === 'p') { const t = node.textContent.trim(); if (t) items.push({ type: 'p', text: t }); return; }
                if (tag === 'blockquote') { const t = node.textContent.trim(); if (t) items.push({ type: 'blockquote', text: t }); return; }
                if (tag === 'pre') { const t = node.textContent; if (t) items.push({ type: 'pre', text: t }); return; }
                if (tag === 'li') { const t = node.textContent.trim(); if (t) items.push({ type: 'li', text: t }); return; }
                if (tag === 'a') {
                    const t = node.textContent.trim();
                    if (t) { const href = node.getAttribute('href') || ''; items.push({ type: 'a', text: t, href }); }
                    return;
                }
                for (let c = node.firstChild; c; c = c.nextSibling) walk(c);
            }
            walk(root);
            return items;
        }

        function buildCleanHtml(items, baseUrl) {
            const body = items.map(it => {
                const t = escapeHtml(it.text || '');
                const a = escapeHtml(it.alt || '');
                switch (it.type) {
                    case 'img': return `<img src="${escapeHtml(it.src)}" alt="${a}" loading="lazy">`;
                    case 'h1': case 'h2': case 'h3': case 'h4': case 'h5': case 'h6':
                        return `<${it.type}>${t}</${it.type}>`;
                    case 'blockquote': return `<blockquote>${t}</blockquote>`;
                    case 'pre': return `<pre>${t}</pre>`;
                    case 'li': return `<li>${t}</li>`;
                    case 'a': return `<a href="${escapeHtml(it.href)}">${t}</a>`;
                    default: return `<p>${t}</p>`;
                }
            }).join('');
            return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<base href="${escapeHtml(baseUrl)}">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.8;padding:12px;margin:0;color:#333;background:#fff;word-break:break-word;overflow-wrap:break-word}
img{max-width:100%;height:auto;display:block;margin:16px auto;border-radius:4px}
h1{font-size:1.7em;margin:20px 0 10px;line-height:1.3}
h2{font-size:1.4em;margin:16px 0 8px;line-height:1.3}
h3{font-size:1.15em;margin:14px 0 6px;line-height:1.4}
p{margin:10px 0}
blockquote{border-left:3px solid #409eff;padding:6px 12px;margin:12px 0;color:#666;background:#f0f7ff;border-radius:0 4px 4px 0}
pre{background:#f5f5f7;padding:12px;border-radius:6px;overflow-x:auto;font-size:.9em;white-space:pre-wrap}
li{margin:4px 0}
a{color:#409eff;text-decoration:none}
</style></head><body>${body}</body></html>`;
        }

        function extractAndRebuild(html, baseUrl) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const main = findMainContent(doc);
            const items = extractElements(main, baseUrl);
            return buildCleanHtml(items, baseUrl);
        }

        /**
         * 6. 核心調度
         */
        class App {
            constructor() {
                this.iframe = document.getElementById('content-viewport');
                this.overlay = document.getElementById('overlay');
                this.urlManager = new UrlManager('https://news.mydrivers.com/blog/');
                this.navController = new NavigationController(this.urlManager);
                this.displaySettings = new DisplaySettings(this.iframe);
                new ZoomGuard();

                this.iframe.addEventListener('load', () => {
                    this.overlay.style.display = 'none';
                    this.displaySettings.applyFontSize();
                });

                window.addEventListener('message', (e) => {
                    if (e.data && e.data.__wbNav) {
                        window.location.href = this.urlManager.generateRedirectUrl(e.data.__wbNav);
                    }
                });
            }

            async launch() {
                const targetUrl = this.urlManager.getTargetUrl();
                this.navController.setCurrentUrl(targetUrl);
                this.overlay.style.display = 'flex';
                this.overlay.textContent = '正在初始化系統並優化排版...';
                try {
                    const html = await this.fetchRemoteContent(targetUrl);
                    this.iframe.srcdoc = extractAndRebuild(html, targetUrl);
                } catch (err) {
                    this.overlay.style.display = 'flex';
                    this.overlay.style.color = '#f56c6c';
                    this.overlay.textContent = '優化失敗: ' + err.message;
                }
            }

            async fetchRemoteContent(url) {
                // 本機同源代理優先（不受瀏覽器 CORS 限制），外部代理降為備用
                const proxies = [
                    u => '/proxy?url=' + encodeURIComponent(u),
                    u => 'https://corsproxy.io/?' + encodeURIComponent(u),
                    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u)
                ];
                let lastErr;
                for (const makeUrl of proxies) {
                    try {
                        const response = await fetch(makeUrl(url));
                        if (response.ok) return await response.text();
                        lastErr = new Error('代理回應 ' + response.status);
                    } catch (e) {
                        lastErr = e;
                    }
                }
                throw new Error('所有代理連線失敗: ' + (lastErr && lastErr.message));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = new App();
            app.launch();
        });
    </script>
</body>
</html>
